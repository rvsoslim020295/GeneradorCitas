<body class="bg-surface text-on-surface h-screen flex flex-col font-body-lg antialiased overflow-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Container restricted to mobile width for web view simulation, full width on actual mobile -->
<div class="w-full max-w-md mx-auto h-full flex flex-col bg-surface-bright shadow-2xl relative overflow-hidden">
<!-- Top App Bar (Contextual Action) -->

<button class="p-2 -ml-2 rounded-full hover:bg-surface-container-low transition-colors text-on-surface flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-on-surface">Registrar Pago</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Scrollable Main Content -->
<main class="flex-1 overflow-y-auto no-scrollbar pb-32">
<!-- Client Context -->
<section class="p-4 flex items-center gap-4 border-b border-outline-variant/20 bg-surface-container-lowest">
<div class="h-12 w-12 rounded-full bg-secondary-container text-on-secondary-container flex items-center justify-center font-headline-sm shadow-sm overflow-hidden shrink-0">
<img alt="Client avatar" class="w-full h-full object-cover" data-alt="Close up portrait of a young woman with neat hair in a brightly lit modern salon environment, shallow depth of field, warm inviting colors." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD2ZvyTbdGAd1FJ1AoEvblO7h4bL8CGYa7rYOFwOS-wz_DbjvgydYduPzmeBnSnne91bMB6PFSKFSsnXk3z2TpibKJDLO5K0qp-D7sDNmRAVXgC8bofUz-4YN0OUJS8PAsljFiTK1IJLsXmkzoCsacvU2PKQQhPS1HT9f4uJp_GiUBdZykx67xx_qc-1tp_O37e4AHuw4QyYkSNEWrVEi9aT-cQLoZY0m7_nAx3A0yqP-sWBBXTfpid0oZcm-nPi9MzVHaqZZWu9SY"/>
</div>
<div>
<h2 class="font-headline-sm text-headline-sm text-on-surface leading-tight">Sofía Vergara</h2>
<p class="font-body-md text-body-md text-on-surface-variant flex items-center gap-1 mt-0.5">
<span class="material-symbols-outlined text-[16px]">schedule</span> 14:00 - 16:30
                    </p>
</div>
</section>
<div class="p-4 space-y-6">
<!-- Resumen de Servicios (Ticket) -->
<section>
<h3 class="font-label-md text-label-md text-on-surface-variant mb-3 uppercase tracking-wider">Resumen de Servicio</h3>
<div class="bg-surface-container-lowest rounded-xl p-4 shadow-sm border border-outline-variant/30 space-y-3">
<div class="flex justify-between items-start">
<div>
<p class="font-body-lg text-body-lg text-on-surface font-medium">Corte de Cabello</p>
<p class="font-body-md text-body-md text-on-surface-variant">Estilista: Carlos M.</p>
</div>
<p class="font-body-lg text-body-lg text-on-surface">$400</p>
</div>
<div class="flex justify-between items-start">
<div>
<p class="font-body-lg text-body-lg text-on-surface font-medium">Tinte Completo</p>
<p class="font-body-md text-body-md text-on-surface-variant">Estilista: Carlos M.</p>
</div>
<p class="font-body-lg text-body-lg text-on-surface">$850</p>
</div>
<div class="border-t border-outline-variant/40 pt-3 mt-1 flex justify-between items-center">
<p class="font-body-md text-body-md text-on-surface-variant">Subtotal</p>
<p class="font-headline-sm text-headline-sm text-on-surface" id="subtotal-amount">$1,250</p>
</div>
</div>
</section>
<!-- Propina (Tip Selector) -->
<section>
<div class="flex justify-between items-center mb-3">
<h3 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Agregar Propina</h3>
<p class="font-label-md text-label-md text-primary" id="tip-amount-display">+$0.00</p>
</div>
<div class="grid grid-cols-4 gap-2">
<!-- Option: 0% / None -->
<label class="cursor-pointer">
<input checked="" class="peer sr-only" name="tip" onchange="calculateTotal()" type="radio" value="0"/>
<div class="h-12 flex flex-col items-center justify-center rounded-lg border border-outline-variant bg-surface-container-lowest peer-checked:border-primary peer-checked:bg-primary-container/20 peer-checked:ring-1 peer-checked:ring-primary transition-all">
<span class="font-body-md text-body-md text-on-surface peer-checked:text-primary font-medium">0%</span>
</div>
</label>
<!-- Option: 10% -->
<label class="cursor-pointer">
<input class="peer sr-only" name="tip" onchange="calculateTotal()" type="radio" value="0.10"/>
<div class="h-12 flex flex-col items-center justify-center rounded-lg border border-outline-variant bg-surface-container-lowest peer-checked:border-primary peer-checked:bg-primary-container/20 peer-checked:ring-1 peer-checked:ring-primary transition-all">
<span class="font-body-md text-body-md text-on-surface peer-checked:text-primary font-medium">10%</span>
</div>
</label>
<!-- Option: 15% -->
<label class="cursor-pointer">
<input class="peer sr-only" name="tip" onchange="calculateTotal()" type="radio" value="0.15"/>
<div class="h-12 flex flex-col items-center justify-center rounded-lg border border-outline-variant bg-surface-container-lowest peer-checked:border-primary peer-checked:bg-primary-container/20 peer-checked:ring-1 peer-checked:ring-primary transition-all">
<span class="font-body-md text-body-md text-on-surface peer-checked:text-primary font-medium">15%</span>
</div>
</label>
<!-- Option: 20% -->
<label class="cursor-pointer">
<input class="peer sr-only" name="tip" onchange="calculateTotal()" type="radio" value="0.20"/>
<div class="h-12 flex flex-col items-center justify-center rounded-lg border border-outline-variant bg-surface-container-lowest peer-checked:border-primary peer-checked:bg-primary-container/20 peer-checked:ring-1 peer-checked:ring-primary transition-all">
<span class="font-body-md text-body-md text-on-surface peer-checked:text-primary font-medium">20%</span>
</div>
</label>
</div>
</section>
<!-- Método de Pago -->
<section>
<h3 class="font-label-md text-label-md text-on-surface-variant mb-3 uppercase tracking-wider">Método de Pago</h3>
<div class="grid grid-cols-2 gap-3">
<!-- Card -->
<label class="cursor-pointer relative">
<input checked="" class="peer sr-only" name="payment_method" type="radio" value="card"/>
<div class="p-4 rounded-xl border border-outline-variant bg-surface-container-lowest shadow-sm hover:shadow-md transition-all flex flex-col items-start gap-3 h-full group">
<div class="icon-container h-10 w-10 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">credit_card</span>
</div>
<span class="font-body-md text-body-md text-on-surface font-medium">Tarjeta</span>
<!-- Check indicator -->
<div class="absolute top-4 right-4 h-5 w-5 rounded-full border border-outline-variant flex items-center justify-center opacity-0 peer-checked:opacity-100 peer-checked:bg-primary peer-checked:border-primary transition-all">
<span class="material-symbols-outlined text-white text-[14px]">check</span>
</div>
</div>
</label>
<!-- Cash -->
<label class="cursor-pointer relative">
<input class="peer sr-only" name="payment_method" type="radio" value="cash"/>
<div class="p-4 rounded-xl border border-outline-variant bg-surface-container-lowest shadow-sm hover:shadow-md transition-all flex flex-col items-start gap-3 h-full group">
<div class="icon-container h-10 w-10 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">payments</span>
</div>
<span class="font-body-md text-body-md text-on-surface font-medium">Efectivo</span>
<div class="absolute top-4 right-4 h-5 w-5 rounded-full border border-outline-variant flex items-center justify-center opacity-0 peer-checked:opacity-100 peer-checked:bg-primary peer-checked:border-primary transition-all">
<span class="material-symbols-outlined text-white text-[14px]">check</span>
</div>
</div>
</label>
<!-- Transfer -->
<label class="cursor-pointer relative">
<input class="peer sr-only" name="payment_method" type="radio" value="transfer"/>
<div class="p-4 rounded-xl border border-outline-variant bg-surface-container-lowest shadow-sm hover:shadow-md transition-all flex flex-col items-start gap-3 h-full group">
<div class="icon-container h-10 w-10 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">account_balance</span>
</div>
<span class="font-body-md text-body-md text-on-surface font-medium">Transferencia</span>
<div class="absolute top-4 right-4 h-5 w-5 rounded-full border border-outline-variant flex items-center justify-center opacity-0 peer-checked:opacity-100 peer-checked:bg-primary peer-checked:border-primary transition-all">
<span class="material-symbols-outlined text-white text-[14px]">check</span>
</div>
</div>
</label>
<!-- App/QR -->
<label class="cursor-pointer relative">
<input class="peer sr-only" name="payment_method" type="radio" value="app"/>
<div class="p-4 rounded-xl border border-outline-variant bg-surface-container-lowest shadow-sm hover:shadow-md transition-all flex flex-col items-start gap-3 h-full group">
<div class="icon-container h-10 w-10 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">qr_code</span>
</div>
<span class="font-body-md text-body-md text-on-surface font-medium">Yape / Plin</span>
<div class="absolute top-4 right-4 h-5 w-5 rounded-full border border-outline-variant flex items-center justify-center opacity-0 peer-checked:opacity-100 peer-checked:bg-primary peer-checked:border-primary transition-all">
<span class="material-symbols-outlined text-white text-[14px]">check</span>
</div>
</div>
</label>
</div>
</section>
<!-- Extra space for scrolling past fixed bottom bar -->
<div class="h-8"></div>
</div>
</main>
<!-- Fixed Bottom Action Area (Glassmorphism effect) -->
<div class="absolute bottom-0 w-full bg-surface-bright/90 backdrop-blur-xl border-t border-outline-variant/30 px-4 py-5 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] z-20 rounded-t-2xl">
<div class="flex justify-between items-end mb-4">
<span class="font-body-lg text-body-lg text-on-surface-variant">Total a Pagar</span>
<div class="text-right">
<span class="font-display-lg text-display-lg text-primary tracking-tight block leading-none" id="final-total">$1,250</span>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 active:scale-[0.98] text-on-primary font-headline-md-mobile text-headline-md-mobile h-14 rounded-xl shadow-md transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">lock</span>
                Confirmar Pago y Cerrar
            </button>
</div>
</div>
<script>
        const subtotal = 1250;
        
        function calculateTotal() {
            // Get selected tip ratio
            const tipRadios = document.getElementsByName('tip');
            let tipRatio = 0;
            for (let i = 0; i < tipRadios.length; i++) {
                if (tipRadios[i].checked) {
                    tipRatio = parseFloat(tipRadios[i].value);
                    break;
                }
            }
            
            // Calculate tip amount and total
            const tipAmount = subtotal * tipRatio;
            const total = subtotal + tipAmount;
            
            // Update UI
            document.getElementById('tip-amount-display').textContent = '+$' + tipAmount.toFixed(2).replace(/\.00$/, '');
            document.getElementById('final-total').textContent = '$' + total.toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 2});
        }
        
        // Initialize on load
        document.addEventListener('DOMContentLoaded', calculateTotal);
    </script>
