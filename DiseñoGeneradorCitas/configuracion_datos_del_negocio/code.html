<input class="bg-transparent border-none p-0 focus:ring-0 text-on-surface font-body-md outline-none w-full" type="text" value="GlowManager Premium"/>

<option>Nail Salon</option>
<option>Wellness Center</option>
</select>

</div>
</div>
