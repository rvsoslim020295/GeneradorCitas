<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface min-h-screen flex items-center justify-center px-margin-page">
<main class="bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm p-8 max-w-md w-full flex flex-col items-center text-center relative overflow-hidden">
<div class="absolute -top-24 -right-24 w-48 h-48 bg-error-container rounded-full blur-3xl opacity-40 pointer-events-none"></div>
<div class="w-20 h-20 rounded-full bg-error-container flex items-center justify-center mb-stack-lg border border-error/10">
<span class="material-symbols-outlined text-error" style="font-size: 40px; font-variation-settings: 'FILL' 1;">error</span>
</div>
<div class="flex flex-col gap-stack-sm mb-stack-lg">
<h1 class="text-display-lg font-display-lg text-on-surface">Algo salió mal</h1>
<p class="text-body-lg font-body-lg text-on-surface-variant max-w-[300px] mx-auto">Estamos experimentando dificultades técnicas. Por favor, intenta de nuevo en unos momentos.</p>
</div>
<div class="w-full flex flex-col gap-stack-md mt-4">
<button class="w-full bg-primary text-on-primary rounded-lg py-3 flex items-center justify-center gap-2 hover:bg-surface-tint transition-colors active:scale-95 shadow-sm text-label-md font-label-md">
<span class="material-symbols-outlined" style="font-size: 18px;">refresh</span>
                Reintentar
            </button>
<button class="text-primary hover:text-on-primary-fixed-variant text-label-md font-label-md transition-colors bg-transparent border-none cursor-pointer">
                Contactar a Soporte
            </button>
</div>
</main>
<script>
        document.querySelector('button.bg-primary').addEventListener('click', function(e) {
            const btn = e.currentTarget;
            const icon = btn.querySelector('.material-symbols-outlined');
            icon.style.transform = 'rotate(360deg)';
            icon.style.transition = 'transform 0.5s ease';
            
            setTimeout(() => {
                icon.style.transition = 'none';
                icon.style.transform = 'rotate(0deg)';
            }, 500);
        });
    </script>
</body></html>
