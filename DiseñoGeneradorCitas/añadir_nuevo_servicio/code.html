<div class="space-y-stack-md">

                        Logística

<div class="grid grid-cols-1 sm:grid-cols-2 gap-stack-lg">
<!-- Select: Categoría -->

                Cancelar
            </button>
<button class="w-full md:w-auto px-8 py-3 rounded-lg bg-primary text-on-primary font-label-md text-label-md shadow-md hover:shadow-lg hover:bg-on-primary-fixed-variant active:scale-[0.98] transition-all focus:ring-2 focus:ring-primary/50 outline-none flex items-center justify-center gap-2" form="new-service-form" id="save-btn" type="submit">
<span class="material-symbols-outlined text-[18px]">save</span>
                Guardar Servicio
            </button>
</div>
</div>
<!-- Micro-interaction script -->
<script>
        document.getElementById('new-service-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('save-btn');
            const originalContent = btn.innerHTML;
            
            // Visual feedback for saving state
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[18px]">progress_activity</span> Guardando...';
            btn.classList.add('opacity-90', 'pointer-events-none');
            
            // Simulate network request
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined text-[18px]">check</span> ¡Guardado!';
                btn.classList.remove('bg-primary', 'hover:bg-on-primary-fixed-variant');
                btn.classList.add('bg-secondary', 'text-on-secondary');
                
                setTimeout(() => {
                    // Reset or close modal logic would go here
                    btn.innerHTML = originalContent;
                    btn.classList.remove('bg-secondary', 'text-on-secondary', 'opacity-90', 'pointer-events-none');
                    btn.classList.add('bg-primary', 'hover:bg-on-primary-fixed-variant');
                }, 2000);
            }, 1000);
        });
    </script>
